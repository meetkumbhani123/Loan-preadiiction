<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DefiLend | ML Loan Default Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>DefiLend AI</h1>
            </div>
            <p>Live ML Default Prediction Engine</p>
        </header>

        <main>
            <div class="form-container glass-panel">
                <h2>Applicant Profile</h2>
                <form id="prediction-form">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="Age">Age</label>
                            <input type="number" id="Age" name="Age" required min="18" max="100" placeholder="e.g. 35">
                        </div>
                        <div class="input-group">
                            <label for="Income">Annual Income ($)</label>
                            <input type="number" id="Income" name="Income" required min="0" placeholder="e.g. 75000">
                        </div>
                        <div class="input-group">
                            <label for="LoanAmount">Loan Amount ($)</label>
                            <input type="number" id="LoanAmount" name="LoanAmount" required min="100" placeholder="e.g. 20000">
                        </div>
                        <div class="input-group">
                            <label for="CreditScore">Credit Score</label>
                            <input type="number" id="CreditScore" name="CreditScore" required min="300" max="850" placeholder="e.g. 720">
                        </div>
                        <div class="input-group">
                            <label for="MonthsEmployed">Months Employed</label>
                            <input type="number" id="MonthsEmployed" name="MonthsEmployed" required min="0" placeholder="e.g. 48">
                        </div>
                        <div class="input-group">
                            <label for="NumCreditLines">Num Credit Lines</label>
                            <input type="number" id="NumCreditLines" name="NumCreditLines" required min="0" placeholder="e.g. 3">
                        </div>
                        <div class="input-group">
                            <label for="InterestRate">Interest Rate (%)</label>
                            <input type="number" id="InterestRate" name="InterestRate" step="0.01" required min="0" placeholder="e.g. 5.5">
                        </div>
                        <div class="input-group">
                            <label for="LoanTerm">Loan Term (Months)</label>
                            <input type="number" id="LoanTerm" name="LoanTerm" required min="1" placeholder="e.g. 36">
                        </div>
                        <div class="input-group">
                            <label for="DTIRatio">DTI Ratio</label>
                            <input type="number" id="DTIRatio" name="DTIRatio" step="0.01" required min="0" placeholder="e.g. 0.35">
                        </div>
                        
                        <div class="input-group">
                            <label for="Education">Education</label>
                            <select id="Education" name="Education">
                                <option value="High School">High School</option>
                                <option value="Bachelor's">Bachelor's</option>
                                <option value="Master's">Master's</option>
                                <option value="PhD">PhD</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="EmploymentType">Employment Type</label>
                            <select id="EmploymentType" name="EmploymentType">
                                <option value="Full-time">Full-time</option>
                                <option value="Part-time">Part-time</option>
                                <option value="Self-employed">Self-employed</option>
                                <option value="Unemployed">Unemployed</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="MaritalStatus">Marital Status</label>
                            <select id="MaritalStatus" name="MaritalStatus">
                                <option value="Single">Single</option>
                                <option value="Married">Married</option>
                                <option value="Divorced">Divorced</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="HasMortgage">Has Mortgage</label>
                            <select id="HasMortgage" name="HasMortgage">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="HasDependents">Has Dependents</label>
                            <select id="HasDependents" name="HasDependents">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="LoanPurpose">Loan Purpose</label>
                            <select id="LoanPurpose" name="LoanPurpose">
                                <option value="Business">Business</option>
                                <option value="Home">Home</option>
                                <option value="Auto">Auto</option>
                                <option value="Education">Education</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="HasCoSigner">Has Co-Signer</label>
                            <select id="HasCoSigner" name="HasCoSigner">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-predict">
                        <span class="btn-text">Run Risk Analysis</span>
                        <div class="loader hidden"></div>
                    </button>
                </form>
            </div>

            <div class="results-container glass-panel hidden" id="results-panel">
                <h2>AI Risk Assessment</h2>
                <div class="prediction-ring">
                    <div class="inner-circle">
                        <span id="prob-percentage">0%</span>
                        <span class="prob-label">Default Risk</span>
                    </div>
                </div>
                <div class="status-indicator" id="status-message">
                    Assessing...
                </div>
                <div class="metrics-grid">
                    <div class="metric">
                        <span class="metric-title">Model Confidence</span>
                        <span class="metric-val">High (88.5%)</span>
                    </div>
                    <div class="metric">
                        <span class="metric-title">Key Driver</span>
                        <span class="metric-val">DTI / Credit Score</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
